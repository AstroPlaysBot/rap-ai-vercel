<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Rap Generator 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 3D Canvas -->
<canvas id="scene"></canvas>

<!-- MAIN APP -->
<div id="app">
<h1>🎤 Rap Generator</h1>
<a id="astroLink" href="https://astroplaysbot.github.io/dashboard" target="_blank">von AstroPlays</a>
<div class="card">
<input id="topics" placeholder="Themen (z.B. Roolexx)">
<input id="artist" placeholder="Stil (z.B. Inspirational Rap)">
<textarea id="lyrics" placeholder="Eigene Zeilen"></textarea>
<input id="beatInput" placeholder="Beat / Mood">
<button onclick="generateRap()">Rap generieren</button>
</div>
<pre id="output"></pre>
</div>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script src="script.js"></script>
<script src="logos.js"></script>

</body>
</html>
